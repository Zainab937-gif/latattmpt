---
layout: default
---
<article class="post-full">
  <header class="post-header">
    {% if page.tags.size > 0 %}<div class="post-tag">{{ page.tags | join: " · " | upcase }}</div>{% endif %}
    <h1 class="post-title-full">{{ page.title }}</h1>
    <div class="post-meta-full">
      <span>{{ page.date | date: "%B %d, %Y" }}</span>
      &nbsp;·&nbsp;
      {% assign words = content | number_of_words %}
      {{ words | divided_by: 200 | plus: 1 }} min read
    </div>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}" class="back-link">← wapas jao</a>
  </footer>
</article>
